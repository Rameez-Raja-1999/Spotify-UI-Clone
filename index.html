<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify - Web Player: Music for everyone</title>
    <link rel="icon" href="./assets/logo.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
</head>
<body>
    <div class="container" id="main-container">

      <!-- Sidebar Home and Search icons -->
        <aside class="sidebar">
            <div class="sidebar-nav">
                <div class="nav-icons">
                    <i class="ri-home-4-line"></i>
                    <a href="#">Home</a>
                </div>
                <div class="nav-icons" id="search">
                    <i class="ri-search-line"></i>
                    <a href="#">Search</a>
                </div> 
            </div>

      <!-- Sidebar library section -->
            <div class="sidebar-library">
                <div class="library-options">
                    <div class="nav-icons" id="search">
                       <img src="./assets/library_icon.png" alt="library-playlists-icon">
                       <a href="#">Your Library</a>
                   </div>
                   <div class="plus-left-arrow">
                        <i class="ri-add-large-line plus" id="arrow"></i>
                        <i class="ri-arrow-right-line right-arrow" id="arrow"></i>
                   </div>
                </div>

                <!-- Sidebar library section boxes -->
                <div class="library-boxes">
                    <div class="box">
                        <div class="box-para1">Create your first playlist</div>
                        <div class="box-para2">it's easy, we'll help you</div>
                        <button class="badge">Create playlist</button>
                    </div>
                </div>
            </div>
        </aside>
      
         <main>main-body</main>
         <footer>footer</footer>
    </div>
</body>
</html>
