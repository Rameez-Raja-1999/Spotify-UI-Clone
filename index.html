<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify - Web Player: Music for everyone</title>
    <link rel="icon" href="./assets/logo.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
</head>
<body>
    <div class="main-container">
        <aside class="left-aside-container">
            <div class="left-aside-nav-icons-container">
                <div class="nav-icons">
                    <i class="ri-home-4-line"></i>
                    <a href="#">Home</a>
                </div>
                <div class="nav-icons" id="search">
                    <i class="ri-search-line"></i>
                    <a href="#">Search</a>
                </div> 
            </div>


            <div class="left-aside-library">
                <div class="aside-library-options">
                    <div class="lab-icons nav-icons">
                    <img src="./assets/library_icon.png" alt="">
                    <a href="#">Your library</a>
                    </div>

                    <div class="plus-left-arrow">
                        <i class="ri-add-large-line"></i>
                        <i class="ri-arrow-right-line"></i>
                    </div>
                </div>
            </div>

            <div class="aside-library-boxes">
                    <div class="box">
                        <div class=" box para1"><h3>Create your first playlist</h3></div>
                        <div class=" box para2"><p>it's easy, we'll help you</p></div>
                        <div class=" btn badge">Create playlist</div>
                    </div>
                </div>

        </aside>

        

         <main>main-body</main>
         <footer>footer</footer>
    </div>
</body>
</html>
